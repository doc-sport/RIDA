<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#16222E">
<title>RIDA — Eric</title>
<link rel="manifest" id="manifest-link">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#F1F4F7; --surface:#FFFFFF; --ink:#16222E; --muted:#5C6C7B;
  --accent:#2148C0; --accent-soft:#E4EAFB; --warn:#C8401A; --warn-soft:#FBE8E1;
  --ok:#1E7F4F; --ok-soft:#E1F3E9; --amber:#B07207; --amber-soft:#FBF0DC;
  --line:#DEE5EC; --shadow:0 1px 3px rgba(22,34,46,.08),0 6px 18px rgba(22,34,46,.06);
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.45;padding-bottom:calc(76px + env(safe-area-inset-bottom))}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font:inherit;color:var(--ink);background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:9px 11px;width:100%}
input:focus,select:focus,textarea:focus,button:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
label{font-size:12.5px;font-weight:600;color:var(--muted);display:block;margin:12px 0 4px;text-transform:uppercase;letter-spacing:.04em}

/* ---------- En-tête compteur ---------- */
header{background:var(--ink);color:#fff;padding:14px 16px 12px;position:sticky;top:0;z-index:40}
.head-row{display:flex;align-items:flex-end;justify-content:space-between;max-width:880px;margin:0 auto;gap:12px}
.brand{font-family:'Barlow Condensed';font-weight:700;font-size:26px;letter-spacing:.02em;line-height:1}
.brand small{display:block;font-family:'Inter';font-weight:500;font-size:11.5px;color:#9FB0C0;letter-spacing:.06em;text-transform:uppercase;margin-top:3px}
.compteur{text-align:right}
.compteur .val{font-family:'IBM Plex Mono';font-weight:600;font-size:24px;line-height:1;color:#FFD44D}
.compteur .lbl{font-size:10.5px;color:#9FB0C0;text-transform:uppercase;letter-spacing:.07em;margin-top:3px}
.h-voir{background:#FFD44D;color:#16222E;font-size:10px;font-weight:700;border-radius:99px;padding:2px 8px;margin-left:4px;text-transform:uppercase;letter-spacing:.05em;vertical-align:1px}
.sync-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#5C6C7B;margin-right:5px;vertical-align:1px}
.sync-dot.on{background:#3ED598}
.pomo{display:flex;flex-direction:column;align-items:center;gap:2px;background:#243444;border:1px solid #35485C;border-radius:12px;padding:6px 11px 5px;color:#fff}
.pomo .pv{font-family:'IBM Plex Mono';font-weight:600;font-size:15px;line-height:1}
.pomo.run{background:#7A2E14;border-color:#A94425}
.pomo.run .pv{color:#FFD44D}

/* ---------- Onglets ---------- */
nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--line);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;padding:9px 2px 8px;font-size:11px;font-weight:600;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:2px}
nav button svg{width:21px;height:21px}
nav button.act{color:var(--accent)}
@media(min-width:720px){
  body{padding-bottom:20px}
  nav{position:sticky;top:64px;bottom:auto;max-width:880px;margin:0 auto;border:1px solid var(--line);border-radius:12px;margin-top:12px}
  nav button{flex-direction:row;gap:7px;font-size:13.5px;padding:11px}
}

/* ---------- Contenu ---------- */
main{max-width:880px;margin:0 auto;padding:14px 14px 30px}
/* ---------- Sélecteur compact (remplace les menus natifs) ---------- */
.pickb{display:block;width:100%;height:36px!important;max-height:36px!important;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:0 22px 0 10px;font-size:13px;line-height:34px;position:relative;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.pickb::after{content:'▾';position:absolute;right:10px;color:var(--muted);font-size:11px}
/* ---------- Carnet de notes par thème ---------- */
.notebtn{font-size:11px;font-weight:600;padding:3px 7px;border-radius:999px;background:#EEF1F5;color:var(--muted)}
.notebtn.plein{background:var(--amber-soft);color:var(--amber)}
.notes-modal{height:94vh;max-height:94vh;display:flex;flex-direction:column}
.notes-modal.lecture{height:100vh;height:100dvh;max-height:100dvh;border-radius:0}
.notes-modal.lecture .note-compo{display:none}

.notes-modal.lecture .note-e .nt img{max-height:340px}
#n-liste{flex:1;overflow-y:auto;min-height:60px;padding-right:2px}
.note-e{background:#F6F8FA;border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:10px}
.note-e .nd{font-family:'IBM Plex Mono';font-size:11px;color:var(--muted);display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.note-e .nd button{color:var(--warn);font-size:14px;padding:0 4px}
.note-e .nt{font-size:var(--note-fs,12px);line-height:1.5;white-space:pre-wrap;overflow-wrap:break-word}
.note-e .nt img,.note-edit img{display:block;max-width:100%;max-height:180px;border-radius:8px;border:1px solid var(--line);margin:6px 0;cursor:zoom-in}
.note-e .nt img.grand{max-height:none;cursor:zoom-out}
.note-e .nt img[style]{max-height:none;height:auto}
.img-wrap{position:relative;display:inline-block;max-width:100%}
.img-wrap img{display:block;outline:2px solid var(--accent);outline-offset:1px;cursor:default}
.img-poignee{position:absolute;right:-9px;bottom:-9px;width:18px;height:18px;background:var(--accent);border:2px solid #fff;border-radius:5px;box-shadow:0 1px 4px rgba(22,34,46,.35);touch-action:none;cursor:nwse-resize;z-index:5}
.note-compo{border-top:1px solid var(--line);padding-top:10px;margin-top:4px}
.note-edit{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px;min-height:34vh;max-height:46vh;overflow-y:auto;font-size:var(--note-fs,12px);line-height:1.5}
.note-edit:empty::before{content:attr(data-ph);color:var(--muted)}
.note-edit:focus{outline:2px solid var(--accent);outline-offset:1px}
.pickb.ph{color:var(--muted)}
/* ---------- RACI ---------- */
.raci-bloc{background:#F6F8FA;border:1px solid var(--line);border-radius:10px;padding:8px 10px;margin-top:4px}
.raci-row{display:flex;align-items:center;gap:5px;margin:5px 0}
.raci-row .rn{flex:1;font-size:13.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.raci-l{width:30px;height:28px;border-radius:7px;font-size:12.5px;font-weight:700;border:1px solid var(--line);background:var(--surface);color:var(--muted)}
.raci-l.on{color:#fff;border-color:transparent}
.raci-l.on.lR{background:var(--accent)}
.raci-l.on.lA{background:var(--amber)}
.raci-l.on.lC{background:var(--ok)}
.raci-l.on.lI{background:#5C6C7B}
.rchip{font-size:11.5px;font-weight:500;background:#EEF1F5;border-radius:999px;padding:2px 8px}
.rchip b{font-weight:800}
a.rchip.lienc{color:var(--accent);text-decoration:none;font-weight:600}
.lien-row{display:flex;align-items:center;gap:8px;background:#F6F8FA;border-radius:9px;padding:6px 10px;margin-top:6px;font-size:13px}
.lien-row .ln{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lien-row .lu{color:var(--muted);font-size:11.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.lien-row button{color:var(--warn);font-size:15px}
a.rchip.lienc:hover{background:var(--accent-soft)}
.rchip.lR b{color:var(--accent)}
.rchip.lA b{color:var(--amber)}
.rchip.lC b{color:var(--ok)}
.rchip.lI b{color:#5C6C7B}
.eq-row{display:flex;align-items:center;gap:8px;margin:6px 0}
.eq-row .en{flex:0 0 42%;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.eq-row .pickb{flex:1;height:32px;line-height:30px;font-size:12px}
#dd-ok{display:none}
.ddb{background:var(--surface);border:1px solid var(--line);border-radius:8px;font-size:11px;padding:5px 14px 5px 6px;position:relative;max-width:31%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ddb::after{content:'▾';position:absolute;right:4px;color:var(--muted);font-size:9px}
.ddb.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);font-weight:600}
.dd-modal{background:var(--surface);width:100%;max-width:560px;max-height:80vh;overflow-y:auto;border-radius:18px 18px 0 0;padding:14px 14px 22px}
@media(min-width:720px){.dd-modal{border-radius:18px}}
.dd-titre{font-family:'Barlow Condensed';font-weight:600;font-size:18px;color:var(--muted);margin-bottom:10px}
.dd-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px}
.dd-grid.serre{grid-template-columns:repeat(4,1fr)}
.dd-opt{font-size:12px;line-height:1.2;padding:8px 8px;border:1px solid var(--line);border-radius:8px;text-align:left;background:var(--surface);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dd-opt.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.filtres{display:flex;gap:8px;flex-wrap:wrap;margin:-14px -14px 12px;padding:10px 14px 8px;position:sticky;top:var(--sticky-top,58px);z-index:30;background:var(--bg);box-shadow:0 6px 8px -6px rgba(22,34,46,.12)}
.filtres input[type=search]{flex:0 1 56px;min-width:44px;font-size:12px;padding:6px 7px;transition:flex-basis .15s}
.filtres input[type=search]:focus{flex-basis:150px}
.filtres select{flex:0 1 auto;width:auto;max-width:31%;font-size:11px;padding:5px 5px;border-radius:8px}
.filtres .raz{flex:0 0 auto;font-size:14px;padding:4px 9px;border-radius:8px;background:#EEF1F5;color:var(--muted)}
select{font-size:13.5px}
.vide{text-align:center;color:var(--muted);padding:48px 20px;font-size:14px}
.vide b{display:block;font-size:16px;color:var(--ink);margin-bottom:6px}

/* ---------- Cartes ---------- */
.carte{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:12px 14px;margin-bottom:10px}
.l1{display:flex;align-items:center;gap:7px;flex-wrap:wrap;font-size:12.5px;color:var(--muted)}
.l1 .mono{font-family:'IBM Plex Mono';font-size:11.5px}
.l1 .ent{color:#93A3B2}
.l1-btns{margin-left:auto;display:flex;gap:5px;flex-wrap:wrap}
.avct-mini{display:inline-flex;align-items:center;gap:5px}
.avct-mini .barre{display:inline-block;width:56px;height:5px;background:#E8EDF2;border-radius:99px;overflow:hidden}
.avct-mini .fill{display:block;height:100%;background:var(--accent);border-radius:99px}
.mini.jour{background:var(--amber-soft);color:var(--amber)}
.mini.jour-on{background:var(--ink);color:#FFD44D}
.l2{font-weight:600;font-size:15px;cursor:pointer;margin-top:7px}
.l2 .chip{font-weight:500}
.c-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.badge{font-size:10.5px;font-weight:700;letter-spacing:.05em;padding:3px 8px;border-radius:999px;text-transform:uppercase}
.b-ACTION{background:var(--accent-soft);color:var(--accent)}
.b-DECISION{background:var(--amber-soft);color:var(--amber)}
.b-IDEE{background:var(--ok-soft);color:var(--ok)}
.b-INFORMATION{background:#EEF1F5;color:var(--muted)}
.b-p1{background:var(--warn-soft);color:var(--warn)}
.b-p2{background:var(--amber-soft);color:var(--amber)}
.b-p3{background:#EEF1F5;color:var(--muted)}
.c-texte{font-weight:600;font-size:15px;cursor:pointer}
.c-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:12.5px;color:var(--muted);margin-top:7px;align-items:center}
.c-meta .mono{font-family:'IBM Plex Mono';font-size:12px}
.retard{color:var(--warn);font-weight:600}
.chip{background:#EEF1F5;border-radius:999px;padding:2px 9px;font-size:12px;font-weight:500}
.avct{display:flex;align-items:center;gap:8px;margin-top:9px}
.avct .barre{flex:1;height:6px;background:#E8EDF2;border-radius:99px;overflow:hidden}
.avct .fill{height:100%;background:var(--accent);border-radius:99px;transition:width .2s}
.avct .num{font-family:'IBM Plex Mono';font-size:12px;color:var(--muted);width:38px;text-align:right}
.c-actions{display:flex;gap:6px;margin-top:9px}
.mini{font-size:12.5px;font-weight:600;padding:6px 11px;border-radius:9px;background:#EEF1F5;color:var(--ink)}
.mini.ok{background:var(--ok-soft);color:var(--ok)}
.mini:hover{filter:brightness(.96)}

/* ---------- FAB ---------- */
.fabs{position:fixed;right:16px;bottom:calc(72px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:12px;z-index:60}
@media(min-width:720px){.fabs{bottom:28px}}
.fab{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(22,34,46,.28)}
.fab.mic{background:var(--accent);color:#fff}
.fab.plus{background:var(--surface);color:var(--accent);border:1px solid var(--line);width:48px;height:48px;align-self:flex-end}
.fab svg{width:26px;height:26px}

/* ---------- Modales ---------- */
.voile{position:fixed;inset:0;background:rgba(22,34,46,.45);z-index:80;display:none;align-items:flex-end;justify-content:center}
.voile.on{display:flex}
@media(min-width:720px){.voile{align-items:center}}
.modal{background:var(--surface);width:100%;max-width:560px;max-height:92vh;overflow-y:auto;border-radius:18px 18px 0 0;padding:18px 18px 26px}
@media(min-width:720px){.modal{border-radius:18px}}
.m-titre{font-family:'Barlow Condensed';font-weight:600;font-size:22px;display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.m-titre button{font-size:26px;color:var(--muted);line-height:1;padding:4px 8px}
.grille{display:grid;grid-template-columns:1fr 1fr;gap:0 12px;align-items:start;align-content:start;grid-auto-rows:min-content}
.grille>div{height:auto;min-height:0}
.grille .full{grid-column:1/-1}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--accent);color:#fff;font-weight:600;border-radius:11px;padding:11px 18px;width:100%;margin-top:16px}
.btn.sec{background:#EEF1F5;color:var(--ink)}
.btn.danger{background:var(--warn-soft);color:var(--warn)}
.btn:disabled{opacity:.5;cursor:default}

/* ---------- Vocal ---------- */
.voc-zone{text-align:center;padding:10px 0 4px}
.voc-btn{width:92px;height:92px;border-radius:50%;background:var(--accent);color:#fff;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(33,72,192,.4);transition:transform .15s}
.voc-btn.rec{background:var(--warn);animation:pulse 1.2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(200,64,26,.45)}70%{box-shadow:0 0 0 22px rgba(200,64,26,0)}100%{box-shadow:0 0 0 0 rgba(200,64,26,0)}}
.voc-btn svg{width:40px;height:40px}
.voc-hint{color:var(--muted);font-size:13px;margin-top:10px}
.transcript{min-height:54px;background:#F6F8FA;border:1px dashed var(--line);border-radius:10px;padding:10px 12px;margin-top:12px;font-size:15px;text-align:left}
.detect{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;justify-content:center}
.detect .chip{background:var(--accent-soft);color:var(--accent);font-weight:600}

/* ---------- Commentaires ---------- */
.com{background:#F6F8FA;border-radius:10px;padding:8px 11px;margin-top:7px;font-size:13.5px}
.com .d{font-family:'IBM Plex Mono';font-size:11px;color:var(--muted);display:block;margin-bottom:2px}
.com-add{display:flex;gap:7px;margin-top:9px}
.com-add input{flex:1}
.com-add button{flex:0 0 auto;padding:0 14px;background:var(--accent-soft);color:var(--accent);border-radius:10px;font-weight:600}

/* ---------- Tableau de bord ---------- */
.tuiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.tuile{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:13px 14px}
.tuile .n{font-family:'Barlow Condensed';font-weight:700;font-size:30px;line-height:1}
.tuile .l{font-size:12px;color:var(--muted);margin-top:3px}
.tuile.warn .n{color:var(--warn)}
.dash-sec{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:12px}
.dash-sec h3{font-family:'Barlow Condensed';font-weight:600;font-size:19px;margin-bottom:10px}
.ligne-stat{display:flex;align-items:center;gap:10px;margin-bottom:7px;font-size:13.5px}
.ligne-stat.clic{cursor:pointer;border-radius:8px;margin-left:-6px;padding:3px 6px}
.ligne-stat.clic:hover{background:var(--accent-soft)}
.ligne-stat.clic .nom{color:var(--accent);font-weight:600}
.ligne-stat .nom{width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ligne-stat .barre{flex:1;height:9px;background:#E8EDF2;border-radius:99px;overflow:hidden}
.ligne-stat .fill{height:100%;background:var(--accent);border-radius:99px}
.ligne-stat .v{font-family:'IBM Plex Mono';font-size:12px;color:var(--muted);width:44px;text-align:right}

/* ---------- Réglages ---------- */
.reg-sec{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px;margin-bottom:12px}
.reg-sec h3{font-family:'Barlow Condensed';font-weight:600;font-size:20px;margin-bottom:4px}
.reg-sec p{font-size:13px;color:var(--muted);margin-bottom:6px}
.reg-sec textarea{min-height:90px;font-size:13.5px}
.note{background:var(--amber-soft);color:var(--amber);border-radius:10px;padding:9px 12px;font-size:13px;margin-top:8px}
.toggle{display:flex;align-items:center;justify-content:space-between;margin-top:12px;font-weight:600;font-size:14px}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(88px + env(safe-area-inset-bottom));background:var(--ink);color:#fff;padding:10px 18px;border-radius:99px;font-size:13.5px;z-index:100;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.on{opacity:1}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<header>
  <div class="head-row">
    <div class="brand">RIDA<small id="h-date"></small></div>
    <div style="display:flex;align-items:flex-end;gap:14px">
      <button class="pomo" id="pomo" title="Pomodoro 25 min — appuyer pour lancer / mettre en pause, appui long pour remettre à zéro">
        <span id="pomo-ico">🍅</span><span class="pv" id="pomo-val">25:00</span>
      </button>
      <div class="compteur">
        <div class="val" id="h-temps">0:00</div>
        <div class="lbl"><span class="sync-dot" id="sync-dot"></span><span id="h-lbl">programmé aujourd'hui</span> <button class="h-voir" onclick="allerJour()" title="Afficher les actions du jour">voir ›</button></div>
      </div>
    </div>
  </div>
</header>

<nav id="nav">
  <button data-vue="encours" class="act"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6h11M9 12h11M9 18h11M4 6h.01M4 12h.01M4 18h.01" stroke-linecap="round"/></svg>En cours</button>
  <button data-vue="fini"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5" stroke-linecap="round" stroke-linejoin="round"/></svg>Terminées</button>
  <button data-vue="dash"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2" stroke-linecap="round"/></svg>Tableau</button>

<div class="toast" id="toast"></div>

<script>
'use strict';
const VERSION='4.1';
// --- diagnostic : affiche toute erreur JavaScript en bandeau rouge ---
window.addEventListener('error', e=>{
  try{
    let b=document.getElementById('diag');
    if(!b){ b=document.createElement('div'); b.id='diag';
      b.style.cssText='position:fixed;top:0;left:0;right:0;z-index:9999;background:#C8401A;color:#fff;font:12px/1.4 monospace;padding:8px 12px;white-space:pre-wrap';
      document.body.appendChild(b); }
    b.textContent+='ERREUR : '+(e.message||e.type)+' — ligne '+(e.lineno||'?')+'\n';
  }catch(x){}
});
window.addEventListener('unhandledrejection', e=>{
  try{ window.dispatchEvent(new ErrorEvent('error',{message:'(promesse) '+(e.reason&&e.reason.message||e.reason)})); }catch(x){}
});
/* ============================================================
   RIDA — application personnelle d'Eric
   Stockage local + synchronisation Google Drive (drive.file)
   ============================================================ */

const DEFAUTS = {
  types: ['IDEE','INFORMATION','DECISION','ACTION'],
  themes: ['COMMOTION','CONGRES','DIV FFC','EDF','ERIC','GYNECO','HS 2027','MENTAL !','OFFRE COMMERCIALE','PASS SANTE PERF','POSTURO','PREVDOP','RESEAU','RESPI VO2','RTM','SMR','TCA'],
  sousThemes: ['ACHATS','AVIS MEDICAL','BE/CF','BUDGET','CNC','COACHING','COMED','CONTRATS','DIV','FFC','LNC','MADBRES','MEDECINE','MFR','PERSO','REGLEMENT','RETROGRADATION','TRANSIDENTITE','RECETTE'],
  ressources: ['Pauline','Axel','Thomas','Guillaume','Jacky','Maryline','Eric C','Marion','Mélanie','Julien','Benoît','Simon']
};

let etat = charger();
let vue = 'encours';
let editId = null;      // id en cours d'édition, null = création
let editComs = [];      // commentaires du brouillon
let editLiens = [];     // liens web du brouillon
let filtres = {q:'', theme:'', stheme:'', ress:'', type:'', tri:'prio', jour:false};

function charger(){
  try{
    const brut = localStorage.getItem('rida');
    if(brut){ const e = JSON.parse(brut); e.lists = Object.assign({}, DEFAUTS, e.lists||{}); e.notes = e.notes||{}; e.equipes = e.equipes||{}; e.sthemes = e.sthemes||{}; return e; }
  }catch(err){}
  return {items:[], notes:{}, equipes:{}, sthemes:{}, lists:JSON.parse(JSON.stringify(DEFAUTS)), settings:{clientId:'',autoSync:false,fileId:''}, updatedAt:Date.now()};
}
function persister(sync=true, touche=true){
  if(touche) etat.updatedAt = Date.now();
  try{ localStorage.setItem('rida', JSON.stringify(etat)); }
  catch(err){ toast("Stockage local indisponible — pense à exporter"); }
  majCompteur();
  if(sync && etat.settings.autoSync && drive.token) drive.pousserDebounce();
}

/* ---------- utilitaires ---------- */
const $ = id => document.getElementById(id);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const auj = () => new Date().toISOString().slice(0,10);
const norm = s => (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
function fmtDate(iso){ if(!iso) return ''; const [a,m,j]=iso.split('-'); return j+'/'+m+'/'+a.slice(2); }
function fmtMin(min){ if(!min) return ''; const h=Math.floor(min/60), m=min%60; return h? h+'h'+(m? String(m).padStart(2,'0'):'') : m+'min'; }
function fmtCompteur(min){ const h=Math.floor(min/60), m=min%60; return h+':'+String(m).padStart(2,'0'); }
function parseTemps(txt){
  if(!txt) return 0;
  txt = norm(String(txt));
  let m;
  if((m = txt.match(/(\d+)\s*h(?:eures?)?\s*(\d+)?/))) return (+m[1])*60 + (+(m[2]||0));
  if((m = txt.match(/(\d+)\s*m(?:in(?:utes?)?)?/))) return +m[1];
  if((m = txt.match(/^(\d+(?:[.,]\d+)?)$/))) return Math.round(parseFloat(m[1].replace(',','.'))*60); // nombre seul = heures (comme Excel)
  return 0;
}
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('on'); clearTimeout(t._to); t._to=setTimeout(()=>t.classList.remove('on'),2600); }
function fermer(id){ $(id).classList.remove('on'); if(id==='v-voc') voc.stop(); }
function ouvrir(id){ $(id).classList.add('on'); }

/* ---------- compteur en-tête ---------- */
function majCompteur(){
  const jour = auj();
  const duJour = etat.items.filter(i=>!i.done && i.datePrev===jour);
  const total = duJour.reduce((s,i)=>s+(i.temps||0),0);
  const nbActions = duJour.filter(i=>i.type==='ACTION').length;
  $('h-temps').textContent = fmtCompteur(total);
  $('h-lbl').textContent = nbActions + (nbActions>1?' actions':' action') + ' à faire aujourd\'hui';
  $('h-date').textContent = new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'}) + ' · v'+VERSION;
}

/* ---------- pomodoro 25 min ---------- */
const pomo = { restant:25*60, actif:false, tick:null,
  aff(){ const m=Math.floor(pomo.restant/60), s=pomo.restant%60;
    $('pomo-val').textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    $('pomo').classList.toggle('run', pomo.actif); },
  toggle(){
    if(pomo.actif){ clearInterval(pomo.tick); pomo.actif=false; pomo.aff(); return; }
    pomo.actif=true; pomo.aff();
    pomo.tick=setInterval(()=>{
      pomo.restant--;
      if(pomo.restant<=0){ clearInterval(pomo.tick); pomo.actif=false; pomo.restant=25*60; pomo.fin(); }
      pomo.aff();
    },1000);
  },
  reset(){ clearInterval(pomo.tick); pomo.actif=false; pomo.restant=25*60; pomo.aff(); },
  fin(){
    toast('🍅 Pomodoro terminé — pause !');
    try{ const ctx=new (window.AudioContext||window.webkitAudioContext)();
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination); o.frequency.value=880; g.gain.value=.12;
      o.start(); setTimeout(()=>{o.frequency.value=660;},180); setTimeout(()=>{o.stop();ctx.close();},420);
    }catch(e){}
    if(navigator.vibrate) navigator.vibrate([200,80,200]);
  }
};

/* ============================================================
   RENDU DES VUES
   ============================================================ */
function rendre(){
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('act', b.dataset.vue===vue));
  $('fabs').style.display = (vue==='encours'||vue==='fini') ? 'flex':'none';
  const m = $('main');
  if(vue==='encours') { m.innerHTML = htmlListe(false); majListe(); }
  else if(vue==='fini') { m.innerHTML = htmlListe(true); majListe(); }
  else if(vue==='dash') m.innerHTML = htmlDash();
  else m.innerHTML = htmlReglages();
  if(vue==='reglages') initReglages();
  majSticky();
  majCompteur();
}
function majSticky(){
  try{
    const h=document.querySelector('header').offsetHeight||58;
    const desktop = window.matchMedia? matchMedia('(min-width:720px)').matches : (window.innerWidth>=720);
    const n=$('nav');
    document.documentElement.style.setProperty('--sticky-top',(h+(desktop? (n.offsetHeight||0)+12:0)-1)+'px');
  }catch(e){}
}
window.addEventListener('resize', majSticky);
window.addEventListener('resize', ()=>{ if($('v-notes').classList.contains('on')) ajusterPoliceNotes(); });

function options(liste, sel){ return '<option value=""></option>'+liste.map(v=>`<option ${v===sel?'selected':''}>${echap(v)}</option>`).join(''); }
function echap(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

function itemsFiltres(fini){
  let items = etat.items.filter(i=>!!i.done===fini);
  const f = filtres;
  if(f.q){ const q=norm(f.q); items=items.filter(i=>norm(i.texte+' '+personnesDe(i).join(' ')+' '+(i.comments||[]).map(c=>c.t).join(' ')).includes(q)); }
  if(f.jour) items=items.filter(i=>i.datePrev===auj());
  if(f.theme) items=items.filter(i=> f.theme==='(sans)' ? !i.theme : i.theme===f.theme);
  if(f.stheme) items=items.filter(i=>i.sousTheme===f.stheme);
  if(f.ress) items=items.filter(i=> f.ress==='(sans)' ? !personnesDe(i).length : personnesDe(i).includes(f.ress));
  if(f.type) items=items.filter(i=>i.type===f.type);
  items.sort((a,b)=>{
    if(fini) return (b.dateFin||'').localeCompare(a.dateFin||'');
    if(f.tri==='prio') return (a.priorite-b.priorite) || (a.datePrev||'9999').localeCompare(b.datePrev||'9999');
    if(f.tri==='date') return (a.datePrev||'9999').localeCompare(b.datePrev||'9999');
    if(f.tri==='ress') return (responsableDe(a)||'\uffff').localeCompare(responsableDe(b)||'\uffff') || (a.priorite-b.priorite);
    return b.cre.localeCompare(a.cre);
  });
  return items;
}
function majListe(){
  const zone=$('liste'); if(!zone) return;
  const fini=(vue==='fini');
  const items=itemsFiltres(fini);
  zone.innerHTML = items.length
    ? items.map(carte).join('')
    : `<div class="vide"><b>${fini?'Aucune entrée terminée':'Rien pour l’instant'}</b>${fini?'Les actions à 100 % arriveront ici.':'Utilise le micro ou le + pour ajouter ta première entrée.'}</div>`;
}
function htmlListe(fini){
  const f = filtres;
  const triLbl={prio:'priorité',date:'date prévue',recent:"date d'entrée",ress:'personne'}[f.tri];
  return `
  <div class="filtres">
    <input type="search" class="rech" placeholder="🔍" value="${echap(f.q)}" oninput="filtres.q=this.value;majListe()" title="Rechercher">
    <button class="ddb ${f.type?'on':''}" onclick="ddFiltre('type')">${echap(f.type||'RIDA')}</button>
    <button class="ddb ${f.theme?'on':''}" onclick="ddFiltre('theme')">${f.theme==='(sans)'?'Sans thème':echap(f.theme||'Thème')}</button>
    <button class="ddb ${f.stheme?'on':''}" onclick="ddFiltre('stheme')">${echap(f.stheme||'Sous-thème')}</button>
    <button class="ddb ${f.ress?'on':''}" onclick="ddFiltre('ress')">${f.ress==='(sans)'?'Sans pers.':echap(f.ress||'Personne')}</button>
    ${fini?'':`<button class="ddb" onclick="ddFiltre('tri')">Tri : ${triLbl}</button>`}
    <button class="raz" onclick="razFiltres()" title="Réinitialiser tous les filtres">↺</button>
    ${f.jour?`<button class="mini jour-on" onclick="filtres.jour=false;rendre()" title="Retirer le filtre du jour">☀ Aujourd'hui ×</button>`:''}
  </div>
  <div id="liste"></div>`;
}
function ddFiltre(cle){
  const l=etat.lists; let titre='',opts=[],act='';
  if(cle==='type'){ titre='RIDA'; opts=[{v:'',l:'Tous'}].concat(l.types.map(v=>({v,l:v}))); act=filtres.type; }
  else if(cle==='theme'){ titre='Thème'; opts=[{v:'',l:'Tous'},{v:'(sans)',l:'— Sans thème'}].concat(l.themes.map(v=>({v,l:v}))); act=filtres.theme; }
  else if(cle==='stheme'){
    const lies=(filtres.theme && filtres.theme!=='(sans)')? (etat.sthemes[filtres.theme]||[]) : [];
    const source=lies.length? lies : l.sousThemes;
    titre='Sous-thème'; opts=[{v:'',l:'Tous'}].concat(source.map(v=>({v,l:v}))); act=filtres.stheme; }
  else if(cle==='ress'){ titre='Personne ressource'; opts=[{v:'',l:'Toutes'},{v:'(sans)',l:'— Sans ressource'}].concat(l.ressources.map(v=>({v,l:v}))); act=filtres.ress; }
  else{ titre='Trier par'; opts=[{v:'prio',l:'Priorité'},{v:'date',l:'Date prévue'},{v:'recent',l:"Date d'entrée"},{v:'ress',l:'Personne ressource'}]; act=filtres.tri; }
  ddOuvrir(titre, opts, act, v=>{ filtres[cle]=v; rendre(); });
}

function carte(i){
  const jour = auj();
  const retard = !i.done && i.datePrev && i.datePrev < jour;
  const cejour = i.datePrev === jour;
  const dernierCom = (i.comments||[]).slice(-1)[0];
  return `<div class="carte">
    <div class="l1">
      <span class="mono ent" title="Date d'entrée">${fmtDate((i.cre||'').slice(0,10))}</span>
      <span class="badge b-${i.type||'INFORMATION'}">${echap(i.type||'—')}</span>
      ${i.theme?`<span class="chip">${echap(i.theme)}${i.sousTheme?' › '+echap(i.sousTheme):''}</span><button class="notebtn ${(etat.notes[i.theme]||[]).length?'plein':''}" onclick="ouvrirNotes('${encodeURIComponent(i.theme)}')" title="Notes du thème ${echap(i.theme)}">📓${(etat.notes[i.theme]||[]).length||''}</button>`:''}
      <span class="badge b-p${i.priorite}">P${i.priorite}</span>
      ${i.done
        ? `<span class="mono">✓ ${fmtDate(i.dateFin)}</span>`
        : `${i.datePrev?`<span class="mono ${retard?'retard':''}">📅 ${fmtDate(i.datePrev)}${retard?' !':''}</span>`:''}
           ${i.temps?`<span class="mono">⏱ ${fmtMin(i.temps)}</span>`:''}
           <span class="avct-mini"><span class="barre"><span class="fill" style="width:${i.avancement*10}%"></span></span><span class="mono">${i.avancement}/10</span></span>`}
      <span class="l1-btns">
      ${i.done
        ? `<button class="mini" onclick="rouvrir('${i.id}')">↩ Rouvrir</button>
           <button class="mini" onclick="editerItem('${i.id}')">Détails</button>`
        : `${i.type==='ACTION'?`<button class="mini ${cejour?'jour-on':'jour'}" onclick="faireCeJour('${i.id}')" title="Programmer pour aujourd'hui (impacte le chrono)">${cejour?'☀ Ce jour ✓':'☀ Ce jour'}</button>`:''}
           <button class="mini" onclick="bouger('${i.id}',1)">+1</button>
           <button class="mini ok" onclick="terminer('${i.id}')">✓ Terminé</button>
           <button class="mini" onclick="editerItem('${i.id}')">✎</button>`}
      </span>
    </div>
    <div class="l2" onclick="editerItem('${i.id}')">${echap(i.texte)} ${raciChips(i)}${lienChip(i)}</div>
    ${dernierCom?`<div class="com"><span class="d">${fmtDate(dernierCom.d)}${(i.comments.length>1)?' · '+i.comments.length+' commentaires':''}</span>${echap(dernierCom.t)}</div>`:''}
  </div>`;
}
function faireCeJour(id){
  const i=trouver(id); if(!i) return;
  if(i.datePrev===auj()){ i.datePrev=''; toast('Retiré du jour'); }
  else{ i.datePrev=auj(); toast('Programmé aujourd\'hui — chrono mis à jour'); }
  i.upd=Date.now(); persister(); rendre();
}

/* ---------- actions sur items ---------- */
function trouver(id){ return etat.items.find(i=>i.id===id); }
function personnesDe(i){ const st=new Set(Object.keys(i.raci||{})); if(i.ressource) st.add(i.ressource); return [...st]; }
function lienChip(i){
  const liens=(i.liens&&i.liens.length)? i.liens : (i.lien? [{n:'',u:i.lien}] : []);
  return liens.filter(l=>/^https?:\/\//i.test(l.u)).map(l=>

const voc = {
  rec:null, actif:false, texte:'', prefill:null,
  dispo(){ return 'webkitSpeechRecognition' in window || 'SpeechRecognition' in window; },
  ouvrirModale(){
    $('voc-txt').textContent=''; $('voc-detect').innerHTML=''; $('voc-valider').disabled=true;
    voc.texte=''; voc.prefill=null;
    if(!voc.dispo()){ $('voc-hint').textContent = "La reconnaissance vocale n'est pas disponible dans ce navigateur. Sur Android et PC, utilise Chrome ou Edge."; $('voc-btn').disabled=true; }
    ouvrir('v-voc');
  },
  toggle(){
    if(voc.actif){ voc.stop(); return; }
    const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
    voc.rec = new SR();
    voc.rec.lang='fr-FR'; voc.rec.interimResults=true; voc.rec.continuous=true;
    voc.rec.onresult = e=>{
      let final='', interim='';
      for(let k=0;k<e.results.length;k++){ (e.results[k].isFinal?final+=e.results[k][0].transcript:interim+=e.results[k][0].transcript); }
      voc.texte=(final+' '+interim).trim();
      $('voc-txt').textContent=voc.texte;
      voc.analyser();
    };
    voc.rec.onerror = e=>{ if(e.error==='not-allowed') $('voc-hint').textContent="Autorise le micro dans les réglages du navigateur pour dicter."; voc.stop(); };
    voc.rec.onend = ()=>{ voc.actif=false; $('voc-btn').classList.remove('rec'); };
    voc.rec.start(); voc.actif=true; $('voc-btn').classList.add('rec');
  },
  stop(){ if(voc.rec){ try{voc.rec.stop();}catch(e){} } voc.actif=false; $('voc-btn').classList.remove('rec'); },
  analyser(){
    const p = analyserPhrase(voc.texte);
    voc.prefill = p;
    const chips=[];
    if(p.type&&p.typeDetecte) chips.push(p.type);
    if(p.theme) chips.push(p.theme);
    if(p.ressource) chips.push('👤 '+p.ressource);
    if(p.temps) chips.push('⏱ '+fmtMin(p.temps));
    if(p.datePrev) chips.push('📅 '+fmtDate(p.datePrev));
    if(p.priorite===1) chips.push('P1');
    $('voc-detect').innerHTML = chips.map(c=>`<span class="chip">${echap(c)}</span>`).join('');
    $('voc-valider').disabled = !p.texte;
  }
};

function analyserPhrase(brut){
  let t = ' '+brut.trim()+' ';
  const n = norm(t);
  const res = {texte:'', type:'ACTION', typeDetecte:false, theme:'', sousTheme:'', ressource:'', temps:0, datePrev:'', priorite:2};
  const enleve = [];

  // Type en début de phrase
  const mType = n.match(/^\s(idee|info(?:rmation)?|decision|action)\b/);
  if(mType){ const map={idee:'IDEE',info:'INFORMATION',information:'INFORMATION',decision:'DECISION',action:'ACTION'};
    res.type=map[mType[1]]; res.typeDetecte=true; enleve.push(new RegExp('^\\s*'+mType[1]+'\\b\\s*,?','i')); }

  // Thème / ressource (mots connus, insensible aux accents)
  for(const th of etat.lists.themes){ if(n.includes(' '+norm(th)+' ')||n.includes(' '+norm(th)+',')){ res.theme=th; enleve.push(new RegExp('\\b'+th.replace(/[.*+?^${}()|[\]\\!]/g,'\\$&')+'\\b','i')); break; } }
  for(const r of etat.lists.ressources){ const nr=norm(r); if(new RegExp('(^|[\\s,])'+nr.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'([\\s,.]|$)').test(n)){ res.ressource=r; break; } }

  // Priorité
  if(/priorite (haute|1)|urgent/.test(n)){ res.priorite=1; enleve.push(/,?\s*(priorit[eé] (haute|1)|urgente?)/i); }
  if(/priorite (basse|3)/.test(n)){ res.priorite=3; enleve.push(/,?\s*priorit[eé] (basse|3)/i); }

  // Temps
  let mT = n.match(/(\d+)\s*h(?:eures?)?\s*(\d+)?/) || null;
  if(mT){ res.temps=(+mT[1])*60+(+(mT[2]||0)); enleve.push(/,?\s*\d+\s*h(?:eures?)?\s*\d*\s*(min(?:utes?)?)?/i); }
  else if((mT=n.match(/(\d+)\s*min(?:utes?)?/))){ res.temps=+mT[1]; enleve.push(/,?\s*\d+\s*min(?:utes?)?/i); }

  // Date
  const d=new Date(); const iso=x=>x.toISOString().slice(0,10);
  const jours={dimanche:0,lundi:1,mardi:2,mercredi:3,jeudi:4,vendredi:5,samedi:6};
  if(/aujourd/.test(n)){ res.datePrev=auj(); enleve.push(/,?\s*aujourd'?hui/i); }
  else if(/apres[- ]demain/.test(n)){ const x=new Date(d); x.setDate(d.getDate()+2); res.datePrev=iso(x); enleve.push(/,?\s*apr[eè]s[- ]demain/i); }
  else if(/\bdemain\b/.test(n)){ const x=new Date(d); x.setDate(d.getDate()+1); res.datePrev=iso(x); enleve.push(/,?\s*demain/i); }
  else{
    for(const j in jours){ if(new RegExp('\\b'+j+'\\b').test(n)){ const x=new Date(d); let diff=(jours[j]-d.getDay()+7)%7; if(diff===0)diff=7; x.setDate(d.getDate()+diff); res.datePrev=iso(x); enleve.push(new RegExp(',?\\s*'+j,'i')); break; } }
    const mD=n.match(/\ble (\d{1,2})[\/ ](\d{1,2})\b/);
    if(!res.datePrev&&mD){ const x=new Date(d.getFullYear(), +mD[2]-1, +mD[1]); if(x<d) x.setFullYear(x.getFullYear()+1); res.datePrev=iso(x); enleve.push(/,?\s*le \d{1,2}[\/ ]\d{1,2}/i); }
  }

  // Texte nettoyé
  let texte=brut.trim();
  for(const rg of enleve) texte=texte.replace(rg,' ');
  texte=texte.replace(/\s{2,}/g,' ').replace(/^[,\s]+|[,\s]+$/g,'');
  res.texte = texte.charAt(0).toUpperCase()+texte.slice(1);
  return res;
}

function ajusterPoliceNotes(){
  try{
    const modele=$('n-liste').querySelector('.note-e .nt') || $('n-texte');
    const W=(modele? modele.clientWidth : 0) || ($('n-liste').clientWidth-26) || 0;
    if(!W) return;
    const ctx=document.createElement('canvas').getContext('2d');
    ctx.font="100px 'Inter', system-ui, sans-serif";

    const ech="le compte rendu de la réunion médicale aborde les points suivants et les décisions prises.";
    const moy=ctx.measureText(ech).width/ech.length;
    let fs=(W*100)/(65*moy);

  }catch(e){}

let selWrap=null;
function deselImg(){
  if(!selWrap) return;
  if(selWrap.isConnected){ const im=selWrap.querySelector('img'); if(im) selWrap.replaceWith(im); }
  selWrap=null;
}
$('n-liste').addEventListener('click', e=>{
  if(e.target.classList.contains('img-poignee')) return;
  if(e.target.tagName==='IMG' && e.target.closest('.nt')){
    if(selWrap && selWrap.contains(e.target)){ deselImg(); return; }
    deselImg();
    const img=e.target;
    const wrap=document.createElement('span'); wrap.className='img-wrap';
    img.replaceWith(wrap); wrap.appendChild(img);
    const poignee=document.createElement('span'); poignee.className='img-poignee'; poignee.title='Glisser pour redimensionner';
    wrap.appendChild(poignee); selWrap=wrap;
    initPoignee(poignee, img);
  } else deselImg();
});
function initPoignee(poignee, img){
  let x0=0, w0=0, contW=0, actif=false;
  const move=e=>{
    if(!actif) return;
    e.preventDefault();
    const nw=Math.max(48, Math.min(contW, w0 + (e.clientX-x0)));
    img.style.width=nw+'px';
  };
  const fin=()=>{
    if(!actif) return; actif=false;
    document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',fin);
    const px=parseFloat(img.style.width)||w0;
    const pct=Math.max(15, Math.min(100, Math.round(px/contW*100)));
    img.style.width=pct+'%';
    persisterTailleImg(img, pct);
  };
  poignee.addEventListener('pointerdown', e=>{
    e.preventDefault(); e.stopPropagation();
    actif=true; x0=e.clientX;
    contW = img.closest('.nt').clientWidth || 300;
    w0 = img.getBoundingClientRect().width || parseFloat(img.style.width) || contW;
    document.addEventListener('pointermove',move); document.addEventListener('pointerup',fin);
  });
}
function persisterTailleImg(img, pct){
  const el=img.closest('.note-e'); if(!el) return;
  const note=(etat.notes[noteTheme]||[]).find(n=>n.id===el.dataset.id); if(!note) return;
  if(note.h===undefined){ note.h=noteCorps(note); delete note.t; delete note.imgs; }
  const imgs=[...el.querySelectorAll('.nt img')];
  const idx=imgs.indexOf(img); if(idx<0) return;
  let k=-1;
  note.h=note.h.replace(/<img\b[^>]*>/g, m=>{
    k++; if(k!==idx) return m;
    const src=(m.match(/src="([^"]*)"/)||[])[1]||'';
    return `<img src="${src}" alt="" style="width:${pct}%">`;
  });
  persister();
}
function fmtDateH(iso){ const d=new Date(iso); return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'2-digit'})+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }
async function compresserImage(blob){
  const url=URL.createObjectURL(blob);
  try{
    const img=await new Promise((ok,ko)=>{ const i=new Image(); i.onload=()=>ok(i); i.onerror=ko; i.src=url; });
    const MAX=1280; let w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
    if(Math.max(w,h)>MAX){ const r=MAX/Math.max(w,h); w=Math.round(w*r); h=Math.round(h*r); }
    const c=document.createElement('canvas'); c.width=w; c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    return c.toDataURL('image/jpeg',0.8);
  }finally{ URL.revokeObjectURL(url); }
}
// collage : images insérées à l'endroit du curseur, texte collé sans mise en forme parasite
$('n-texte').addEventListener('paste', async e=>{
  e.preventDefault();
  const cd=e.clipboardData||{};
  const imgs=[...(cd.items||[])].filter(it=>it.type&&it.type.startsWith('image/'));
  if(imgs.length){
    for(const it of imgs){
      const f=it.getAsFile();
      if(f){ try{ const u=await compresserImage(f); insererDansNote(`<img src="${u}" alt="">`); }catch(err){ toast('Image illisible'); } }
    }
  }else{
    const txt=cd.getData? cd.getData('text/plain'):'';
    if(txt) document.execCommand('insertText', false, txt);
  }
});
function insererDansNote(html){
  $('n-texte').focus();
  try{ document.execCommand('insertHTML', false, html); }
  catch(e){ $('n-texte').innerHTML += html; }
}
// assainissement : on ne conserve que le texte, les sauts de ligne et les images data:
function assainirNote(racine){
  let out='';
  const marche=(n)=>{
    n.childNodes.forEach(c=>{
      if(c.nodeType===3) out+=echap(c.textContent);
      else if(c.nodeName==='IMG'){ if(/^data:image\//.test(c.getAttribute('src')||'')){
        const wm=(c.getAttribute('style')||'').match(/width:\s*(\d{1,3})%/);
        out+=`<img src="${c.getAttribute('src')}" alt=""${wm?` style="width:${wm[1]}%"`:''}>`; } }
      else if(c.nodeName==='BR') out+='<br>';
      else if(c.nodeType===1){ marche(c); if(/^(DIV|P)$/.test(c.nodeName)) out+='<br>'; }
    });
  };
  marche(racine);
  return out.replace(/(<br>\s*)+$/,'');
}
function ajouterNote(){
  const ed=$('n-texte');
  const h=assainirNote(ed);
  const texteSeul=h.replace(/<img[^>]*>/g,'').replace(/<br>/g,'').trim();
  if(!texteSeul && !/<img/.test(h)){ toast('Écris un texte ou colle une image'); return; }
  if(noteEditId){
    const n=(etat.notes[noteTheme]||[]).find(n=>n.id===noteEditId);
    if(n){ n.h=h; delete n.t; delete n.imgs; }
    noteEditId=null;
  }else{
    if(!etat.notes[noteTheme]) etat.notes[noteTheme]=[];
    etat.notes[noteTheme].push({id:uid(), d:new Date().toISOString(), h});
  }
  ed.innerHTML='';
  majBoutonsNote();
  persister(); rendreNotes(); rendre();
  toast('Note enregistrée ✓');
}
function supprimerNote(id){
  if(!confirm('Supprimer cette note ?')) return;
  etat.notes[noteTheme]=(etat.notes[noteTheme]||[]).filter(n=>n.id!==id);
  if(!etat.notes[noteTheme].length) delete etat.notes[noteTheme];
  if(noteEditId===id) annulerEditionNote();
  persister(); rendreNotes(); rendre();
}

function htmlDash(){
  const jour=auj();
  const actions=etat.items.filter(i=>!i.done && i.type==='ACTION');
  const retard=actions.filter(i=>i.datePrev && i.datePrev<jour);
  const debutMois=jour.slice(0,8)+'01';
  const finiMois=etat.items.filter(i=>i.done && i.type==='ACTION' && (i.dateFin||'')>=debutMois);
  const tTotal=actions.reduce((s,i)=>s+(i.temps||0),0);
  const stat=(cle)=>{ const m={}; actions.forEach(i=>{
    if(cle==='ressource'){ const ps=personnesDe(i); if(!ps.length) m['(sans)']=(m['(sans)']||0)+1; else ps.forEach(p=>m[p]=(m[p]||0)+1); }
    else{ const k=i[cle]||'(sans)'; m[k]=(m[k]||0)+1; }
  }); return Object.entries(m).sort((a,b)=>b[1]-a[1]); };
  const lignes=(paires, cle)=>{ const max=Math.max(1,...paires.map(p=>p[1]));
    return paires.map(([k,v])=>{
      const clic = cle ? `onclick="allerFiltre('${cle}','${encodeURIComponent(k)}')" role="button" tabindex="0" title="Voir ces actions"` : '';
      return `<div class="ligne-stat ${clic?'clic':''}" ${clic}><span class="nom">${k==='(sans)'?'— Sans '+(cle==='ress'?'ressource':'thème'):echap(k)}</span><div class="barre"><div class="fill" style="width:${v/max*100}%"></div></div><span class="v">${v}</span></div>`;
    }).join('') || '<p style="font-size:13px;color:var(--muted)">Aucune action en cours.</p>'; };
  return `
  <div class="tuiles">
    <div class="tuile"><div class="n">${actions.length}</div><div class="l">actions à mener</div></div>
    <div class="tuile ${retard.length?'warn':''}"><div class="n">${retard.length}</div><div class="l">en retard</div></div>
    <div class="tuile"><div class="n">${finiMois.length}</div><div class="l">terminées ce mois</div></div>
    <div class="tuile"><div class="n" style="font-family:'IBM Plex Mono';font-size:24px;padding-top:4px">${fmtCompteur(tTotal)}</div><div class="l">temps imparti (total)</div></div>
  </div>
  <div class="dash-sec"><h3>Actions par thème</h3>${lignes(stat('theme'),'theme')}</div>
  <div class="dash-sec"><h3>Actions par ressource</h3>${lignes(stat('ressource'),'ress')}</div>
  <div class="dash-sec"><h3>Actions par priorité</h3>${lignes([['P1 — Haute',actions.filter(i=>i.priorite===1).length],['P2 — Moyenne',actions.filter(i=>i.priorite===2).length],['P3 — Basse',actions.filter(i=>i.priorite===3).length]],null)}</div>`;
}

/* ---------- exports / imports ---------- */
function telecharger(nom, contenu, type){
  const b=new Blob([contenu],{type}); const u=URL.createObjectURL(b);
  const a=document.createElement('a'); a.href=u; a.download=nom; a.click();
  setTimeout(()=>URL.revokeObjectURL(u),4000);
}
function expJSON(){ telecharger('rida-export-'+auj()+'.json', JSON.stringify(etat,null,1), 'application/json'); }
function impJSON(f){
  if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{
      const e=JSON.parse(r.result);
      if(!Array.isArray(e.items)) throw 0;
      if(!confirm('Remplacer les données actuelles par ce fichier ('+e.items.length+' entrées) ?')) return;
      etat=e; etat.lists=Object.assign({},DEFAUTS,etat.lists||{}); etat.notes=etat.notes||{}; etat.equipes=etat.equipes||{}; etat.sthemes=etat.sthemes||{}; persister(); rendre(); toast('Import réussi ✓');
    }catch(err){ toast('Fichier JSON non reconnu'); } };
  r.readAsText(f);
}
function ligneExcel(i){
  return { 'Date inscription': i.cre? fmtDate(i.cre.slice(0,10)):'', 'RIDA': i.type, 'Thème': i.theme, 'Sous-Thème': i.sousTheme,
    'RIDA ERIC': i.texte, 'Avanct 1-10': i.avancement, 'Date prev': fmtDate(i.datePrev), 'Date finalisation': fmtDate(i.dateFin),
    'Priorisation': i.priorite, 'Temps': i.temps? (i.temps/60):'', 'Ressource': i.ressource, 'Liens': ((i.liens&&i.liens.length)? i.liens.map(l=>(l.n?l.n+' : ':'')+l.u).join(' | ') : (i.lien||'')),
    'Commentaire': (i.comments||[]).map(c=>fmtDate(c.d)+' : '+c.t).join(' | ') };

function expExcel(){
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(etat.items.filter(i=>!i.done).map(ligneExcel)), 'RIDA');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(etat.items.filter(i=>i.done).map(ligneExcel)), '100%');
  XLSX.writeFile(wb, 'RIDA-'+auj()+'.xlsx');
}
function impExcel(f){
  if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const wb=XLSX.read(r.result,{type:'array',cellDates:true});
      let ajoutes=0;
      const traiter=(nomFeuille, done)=>{
        const ws=wb.Sheets[nomFeuille]; if(!ws) return;
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        // trouve la ligne d'en-têtes (contient "Thème")
        let h=-1;
        for(let k=0;k<Math.min(rows.length,6);k++){ if(rows[k].some(c=>norm(String(c)).includes('theme'))){ h=k; break; } }
        if(h<0) return;
        const heads=rows[h].map(c=>norm(String(c)));
        const col=(...mots)=>heads.findIndex(x=>mots.some(m=>x.includes(m)));
        const cTxt=col('rida eric'), cType=Math.max(col('rida'),0)===col('rida eric')?1:heads.findIndex((x,ix)=>ix!==col('rida eric')&&(x==='rida'||x==='action')),
              cTh=col('theme'), cSTh=col('sous'), cAv=col('avanc'), cDP=col('date prev'), cDF=col('finalisation'),
              cPr=col('priorisation'), cTe=col('temps'), cRe=col('ressource'), cCo=col('commentaire'), cDI=col('inscription');
        const dISO=v=>{ if(v instanceof Date&&!isNaN(v)) return v.toISOString().slice(0,10);
          if(typeof v==='number'&&v>20000) return new Date(Math.round((v-25569)*86400*1000)).toISOString().slice(0,10);
          const m=String(v).match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})/); if(m){ let a=+m[3]; if(a<100)a+=2000; return a+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[1]).padStart(2,'0'); } return ''; };
        for(let k=h+1;k<rows.length;k++){
          const rw=rows[k];
          const texte=String(cTxt>=0?rw[cTxt]:'').trim();
          if(!texte) continue;
          let temps=0; const vT=cTe>=0?rw[cTe]:'';
          if(typeof vT==='number') temps=vT<15? Math.round(vT*60):Math.round(vT); else temps=parseTemps(vT);
          const coms=[]; const vC=String(cCo>=0?rw[cCo]:'').trim(); if(vC) coms.push({d:auj(),t:vC});
          etat.items.push({ id:uid(), cre:(dISO(cDI>=0?rw[cDI]:'')||auj())+'T00:00:00.000Z',
            type:norm(String(cType>=0?rw[cType]:'')).toUpperCase().includes('IDE')?'IDEE':(String(cType>=0?rw[cType]:'ACTION').toUpperCase().trim()||'ACTION'),
            theme:String(cTh>=0?rw[cTh]:'').trim(), sousTheme:String(cSTh>=0?rw[cSTh]:'').trim(),
            texte, avancement: done?10:Math.max(0,Math.min(10,parseInt(cAv>=0?rw[cAv]:0)||0)),
            datePrev:dISO(cDP>=0?rw[cDP]:''), dateFin:dISO(cDF>=0?rw[cDF]:''),
            priorite:[1,2,3].includes(+((cPr>=0?rw[cPr]:2)))?+(rw[cPr]):2,
            temps, ressource:String(cRe>=0?rw[cRe]:'').trim(), comments:coms, done, upd:Date.now() });
          ajoutes++;
        }
      };
      traiter('RIDA', false); traiter('100%', true);
      if(!ajoutes){ toast('Aucune ligne reconnue dans ce fichier'); return; }
      persister(); rendre(); toast(ajoutes+' entrées importées ✓');
    }catch(err){ console.error(err); toast("Impossible de lire ce fichier Excel"); }
  };
  r.readAsArrayBuffer(f);
}

/* ============================================================
   GOOGLE DRIVE (scope drive.file)
   ============================================================ */
const drive = {
  token:null, _deb:null,
  async gis(){
    if(window.google?.accounts?.oauth2) return;
    await new Promise((ok,ko)=>{ const s=document.createElement('script'); s.src='https://accounts.google.com/gsi/client'; s.onload=ok; s.onerror=ko; document.head.appendChild(s); });
  },
  async connecter(){
    const cid=(etat.settings.clientId||'').replace(/\s+/g,'');
    if(!cid){ toast('Renseigne d’abord ton Client ID Google'); return; }
    try{ await drive.gis(); }catch(e){ toast('Impossible de charger le module Google'); return; }
    const tc=google.accounts.oauth2.initTokenClient({
      client_id:cid, scope:'https://www.googleapis.com/auth/drive.file',
      callback:async r=>{ if(r.access_token){ drive.token=r.access_token; $('sync-dot').classList.add('on'); toast('Connecté à Drive ✓'); await drive.synchroniser(true); } }
    });
    tc.requestAccessToken();
  },
  async api(url, opts={}){
    opts.headers=Object.assign({Authorization:'Bearer '+drive.token}, opts.headers||{});
    const r=await fetch(url,opts);
    if(r.status===401){ drive.token=null; $('sync-dot').classList.remove('on'); throw new Error('auth'); }
    return r;
  },
  async trouverFichier(){
    if(etat.settings.fileId) return etat.settings.fileId;
    const r=await drive.api("https://www.googleapis.com/drive/v3/files?q=name%3D'rida-data.json'%20and%20trashed%3Dfalse&fields=files(id)");
    const j=await r.json();
    if(j.files&&j.files.length){ etat.settings.fileId=j.files[0].id; persister(false,false); return j.files[0].id; }
    return null;
  },
  async pousser(){
    if(!drive.token) return;
    const corps=JSON.stringify(etat);
    drive.pousseA=etat.updatedAt;
    let id=await drive.trouverFichier();
    if(id){ await drive.api('https://www.googleapis.com/upload/drive/v3/files/'+id+'?uploadType=media',{method:'PATCH',headers:{'Content-Type':'application/json'},body:corps}); }
    else{
      const meta={name:'rida-data.json',mimeType:'application/json'};
      const fd=new FormData();
      fd.append('metadata', new Blob([JSON.stringify(meta)],{type:'application/json'}));
      fd.append('file', new Blob([corps],{type:'application/json'}));
      const r=await drive.api('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',body:fd});
      const j=await r.json(); etat.settings.fileId=j.id; persister(false,false);
    }
  },
  pousserDebounce(){ clearTimeout(drive._deb); drive._deb=setTimeout(()=>{ if(!drive.vide(etat)) drive.pousser().catch(()=>{}); },2500); },
  vide(e){ return !((e.items||[]).length) && !Object.keys(e.notes||{}).length; },
  resume(e){ return (e.items||[]).length+' entrée(s), '+Object.keys(e.notes||{}).length+' carnet(s)'; },
  appliquer(distant){
    const st=Object.assign({}, etat.settings);
    etat=distant;
    etat.settings=Object.assign({}, distant.settings||{}, {fileId:st.fileId, clientId:st.clientId, autoSync:st.autoSync});
    etat.lists=Object.assign({},DEFAUTS,etat.lists||{});
    etat.notes=etat.notes||{}; etat.equipes=etat.equipes||{}; etat.sthemes=etat.sthemes||{};
    persister(false,false); drive.pousseA=etat.updatedAt; rendre();
  },
  async lireDistant(){
    const id=await drive.trouverFichier();
    if(!id) return null;
    const r=await drive.api('https://www.googleapis.com/drive/v3/files/'+id+'?alt=media');
    const j=await r.json();
    return (j && Array.isArray(j.items))? j : null;
  },
  // Récupérer explicitement : Drive → cet appareil
  async recuperer(){
    if(!drive.token){ await drive.connecter(); return; }
    try{
      const distant=await drive.lireDistant();
      if(!distant){ toast('Aucune donnée sur le Drive'); return; }
      if(!confirm('Charger les données du Drive ('+drive.resume(distant)+') ?\nLe contenu de cet appareil ('+drive.resume(etat)+') sera remplacé.')) return;
      drive.appliquer(distant);
      toast('Données récupérées depuis Drive ✓');
    }catch(e){ drive.err(e); }
  },
  // Envoyer explicitement : cet appareil → Drive
  async envoyer(){
    if(!drive.token){ await drive.connecter(); return; }
    try{
      const distant=await drive.lireDistant();
      if(distant && !drive.vide(distant) && drive.vide(etat)){
        if(!confirm('ATTENTION : cet appareil est vide et le Drive contient '+drive.resume(distant)+'.\nEnvoyer effacerait ces données. Continuer quand même ?')) return;
      }
      await drive.pousser();
      toast('Envoyé sur Drive ✓');
    }catch(e){ drive.err(e); }
  },
  err(e){
    if(e && e.message==='auth') toast('Session Drive expirée — reconnecte-toi');
    else toast('Erreur de synchronisation');
  },
  pousseA:0, _auto:false,
  // Vérification automatique à l'ouverture et au retour sur l'appli
  async verifier(){
    if(!drive.token || drive._auto) return;
    drive._auto=true;
    try{
      const distant=await drive.lireDistant();
      if(!distant){ drive._auto=false; return; }
      if((distant.updatedAt||0) <= (etat.updatedAt||0)){ drive._auto=false; return; }
      // le Drive est plus récent que cet appareil
      const enAttente = !drive.vide(etat) && etat.updatedAt !== drive.pousseA;
      if(enAttente){
        // des modifications locales n'ont pas encore été envoyées : on ne touche à rien
        toast('Drive plus récent — vérifie dans Réglages'); drive._auto=false; return;
      }
      drive.appliquer(distant);
      toast('Données à jour depuis Drive ✓');
    }catch(e){ /* silencieux */ }
    drive._auto=false;
  },
  // Synchronisation raisonnée, sans écrasement aveugle
  async synchroniser(silence){
    if(!drive.token){ await drive.connecter(); return; }
    try{
      const distant=await drive.lireDistant();
      if(!distant){ await drive.pousser(); if(!silence) toast('Envoyé sur Drive ✓'); return; }
      const locVide=drive.vide(etat), disVide=drive.vide(distant);
      // appareil vide, Drive plein : on récupère, jamais l'inverse
      if(locVide && !disVide){ drive.appliquer(distant); drive.pousseA=etat.updatedAt; toast('Données récupérées depuis Drive ✓'); return; }
      if(!locVide && disVide){ await drive.pousser(); if(!silence) toast('Envoyé sur Drive ✓'); return; }
      if(locVide && disVide){ if(!silence) toast('Rien à synchroniser'); return; }
      // les deux ont du contenu : le plus récent gagne, avec confirmation
      if((distant.updatedAt||0) > (etat.updatedAt||0)){
        if(confirm('La version Drive est plus récente ('+drive.resume(distant)+').\nLa charger sur cet appareil ? (contenu actuel : '+drive.resume(etat)+')')){
          drive.appliquer(distant); toast('Données récupérées depuis Drive ✓'); return;
        }
        if(!confirm('Envoyer plutôt cet appareil vers le Drive et écraser la version distante ?')) return;
      }
      await drive.pousser(); if(!silence) toast('Enregistré sur Drive ✓');
    }catch(e){ drive.err(e); }
  }

};
